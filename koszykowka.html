<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koszykówka - Rozgrywki Międzyklasowe</title>
    <link rel="icon" type="png" href="logo_szkoly.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tylko style specyficzne dla koszykówki – reszta jest w style.css */
        .tables-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        /* Wyróżnienie dla dwóch pierwszych drużyn w grupie */
        .sports-table tbody tr.qualified {
           background: rgba(76, 175, 80, 0.12);   /* delikatny zielony odcień */
          border-left: 4px solid var(--success-color);
          font-weight: 500;                      /* opcjonalnie lekko pogrubiona czcionka */
        }
        .sports-table th:nth-child(1){
            border-left: 4px solid var(--primary-color);
        }
        .group-table {
            flex: 1 1 50px;
            min-width: 300px;
        }

        .group-table h3 {
            text-align: center;
            background: var(--primary-color);
            color: white;
            padding: 7px;
            margin: 0;
            border-radius: 8px 8px 0 0;
        }

        /* Nagłówki tabeli – wzorowane na index.html */
        .full-text { display: inline; }
        .short-text { display: none; }

        @media (max-width: 600px) {
            .full-text { display: none; }
            .short-text { display: inline; }

            /* Zmniejszenie czcionki i paddingów */
            .sports-table th,
            .sports-table td {
                font-size: 0.8rem;
                padding: 8px 3px;
            }
        }

        @media (max-width: 400px) {
            .sports-table th,
            .sports-table td {
                font-size: 0.7rem;
                padding: 5px 2px;
            }
        }

        @media (max-width: 700px) {
            .tables-container {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        /* Wyrównanie pionowe wszystkich komórek tabeli */
        .sports-table td {
            vertical-align: middle;
        }

        /* Usunięcie marginesu z nazwy drużyny */
        .sports-table td .team-name {
            display: inline-block;
            margin-bottom: 0;
            line-height: 1.4;
        }

        /* ===== KAFELKI MECZÓW – POPRAWIONE ===== */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .match-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .match-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(26, 35, 126, 0.15);
        }

        .match-card--finished {
            border-left: 4px solid var(--success-color);
        }

        .match-card--upcoming {
            border-left: 4px solid var(--secondary-color);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .match-date {
            color: var(--gray-color);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .match-date i {
            color: var(--primary-color);
            opacity: 0.7;
        }

        .date-time-separator {
            width: 5px;
            height: 20px;
            margin: 0 4px;
        }

        .match-date span {
            margin: 0 2px;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            gap: 10px;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .team-home {
            align-items: flex-start;
            text-align: left;
        }

        .team-away {
            align-items: flex-end;
            text-align: right;
        }

        .team-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin-bottom: 6px;
            line-height: 1.3;
            max-width: 100%;
            word-break: break-word;
        }

        .team-score {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            background: rgba(26, 35, 126, 0.1);
            padding: 5px 18px;
            border-radius: 40px;
            display: inline-block;
        }

        .team-score-empty {
            background: transparent;
            color: var(--gray-color);
            font-size: 1.5rem;
            opacity: 0.5;
            padding: 5px 15px;
        }

        /* Separator domyślny (na duże ekrany) */
        .match-score-separator {
            font-size: 2rem;
            font-weight: 600;
            color: var(--gray-color);
            opacity: 0.7;
            margin: 0 5px;
        }

        /* Domyślnie pokazujemy separator z dwukropkiem, ukrywamy wersję mobilną */
        .desktop-only {
            display: flex;
        }
        .mobile-only {
            display: none;
        }

        .match-footer {
            padding: 10px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .match-status {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-sport-icon {
            color: var(--primary-light);
            opacity: 0.3;
            font-size: 1.2rem;
        }

        .status-upcoming {
            background: #e3f2fd;
            color: var(--secondary-color);
        }

        .status-finished {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .status-live {
            background: #ffebee;
            color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .matches-group-header {
            grid-column: 1 / -1;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 1.4em;
        }

        .btn-refresh {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: var(--danger-color);
            background: #ffebee;
            border-radius: 8px;
        }

        /* Styl dla zwycięzcy meczu */
        .team-winner .team-name {
            font-weight: 800;
            color: var(--primary-color);
        }
        .team-winner .team-score {
            background: var(--primary-color);
            color: white;
        }

        /* Responsywność dla kafelków */
        @media (max-width: 600px) {
            .match-teams {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            /* Ukrywamy separator desktopowy, pokazujemy mobilny */
            .desktop-only {
                display: none;
            }
            .mobile-only {
                display: block;
                font-size: 1.5rem;
                margin: 5px 0;
                text-align: center;
                font-weight: 600;
                color: var(--gray-color);
                opacity: 0.7;
            }

            .team {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .team-home, .team-away {
                align-items: center;
                text-align: center;
            }

            .team-name {
                font-size: 1.1rem;
                margin-bottom: 0;
                flex: 1;
            }

            .team-score, .team-score-empty {
                font-size: 1.5rem;
                padding: 5px 12px;
                margin-left: 10px;
            }
        }

        @media (max-width: 400px) {
            .match-header {
                padding: 12px 15px;
            }

            .match-date {
                font-size: 0.85rem;
                padding: 4px 10px;
            }

            .match-footer {
                padding: 8px 15px 15px;
            }

            .match-status {
                font-size: 0.7rem;
                padding: 4px 12px;
            }

            .match-sport-icon {
                font-size: 1rem;
            }
        }
    </style>
</head>

    <!-- Skrypty header (data, dropdown) -->
    <script>
        function updateCurrentDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('pl-PL', options);
            document.getElementById('currentDate').textContent = dateString;
        }
        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentDate();
            setInterval(updateCurrentDate, 60000);
        });

        document.addEventListener('DOMContentLoaded', function() {
            const dropdowns = document.querySelectorAll('.dropdown');
            dropdowns.forEach(dropdown => {
                const toggle = dropdown.querySelector('a');
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const isOpen = dropdown.classList.contains('open');
                    dropdowns.forEach(other => other.classList.remove('open'));
                    if (!isOpen) dropdown.classList.add('open');
                });
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dropdown')) {
                    dropdowns.forEach(d => d.classList.remove('open'));
                }
            });
        });
    </script>

    <!-- Główny skrypt ładujący dane (JSON, tak jak w index.html) -->
    <script>
        (function() {
            const SPREADSHEET_ID = '1qLCQ-6uTyusQRsY23d0tvtEx2XcYmR4MLuwGVriow58';
            const SHEET_NAME = 'Dane_Kosz';
            
            // Zakres dla tabel grupowych (A2:G20)
            const GROUPS_RANGE = 'A2:H20';
            const groupsUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&range=${GROUPS_RANGE}`;
            
            // Zakres dla meczów (L2:R100)
            const MATCHES_RANGE = 'L2:R100';
            const matchesUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&range=${MATCHES_RANGE}`;

            // Zakres dla drabinki pucharowej (N32:Q35)
            const BRACKET_RANGE = 'N32:Q35';
            const bracketUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&range=${BRACKET_RANGE}`;
            // ================== FUNKCJE POMOCNICZE ==================
            function displayError(containerId, message) {
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
                }
            }

            function showLoading(containerId) {
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-3x"></i><p>Ładowanie danych...</p></div>';
                }
            }

            // ================== TABELE GRUPOWE ==================
            function renderGroupTable(groupName, teamRows) {
                let html = `
                    <div class="group-table">
                        <h3>${groupName}</h3>
                        <div class="table-container">
                            <table class="sports-table">
                                <thead>
                                    <tr>
                                        <th><span class="full-text">Klasa</span><span class="short-text">Kl</span></th>
                                        <th><span class="full-text">Nazwa</span><span class="short-text">Nazwa</span></th>
                                        <th><span class="full-text">Wygrane</span><span class="short-text">W</span></th>
                                        <th><span class="full-text">Przegrane</span><span class="short-text">P</span></th>
                                        <th><span class="full-text">Remisy</span><span class="short-text">R</span></th>
                                        <th><span class="full-text">+/-</span><span class="short-text">+/-</span></th>
                                        <th><span class="full-text">Pkt</span><span class="short-text">PKT</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                `;
                if (teamRows.length === 0) {
                    html += `<tr><td colspan="7" class="empty-state">Brak danych w grupie</td></tr>`;
                } else {
                    teamRows.forEach((team, index) => {
                    const rowClass = index < 2 ? ' class="qualified"' : '';
                    html += `<tr${rowClass}>
                        <td>${team.class || ''}</td>
                        <td><span class="team-name">${team.name || ''}</span></td>
                        <td>${team.wins}</td>
                        <td>${team.losses}</td>
                        <td>${team.draws}</td>
                        <td>${team.pointsDiff || '0'}</td>
                        <td><strong>${team.points}</strong></td>
                    </tr>`;
                });
                }
                html += `</tbody></table></div></div>`;
                return html;
            }

            function loadBasketballData() {
                const container = document.getElementById('tablesContainer');
                showLoading('tablesContainer');

                fetch(groupsUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Błąd sieci');
                        return response.text();
                    })
                    .then(text => {
                        const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
                        if (!jsonText) throw new Error('Nieprawidłowa odpowiedź z Google Sheets');
                        
                        const data = JSON.parse(jsonText[1]);
                        const rows = data.table.rows;

                        if (!rows || rows.length === 0) {
                            container.innerHTML = '<div class="empty-state"><i class="far fa-frown"></i><p>Brak danych</p></div>';
                            return;
                        }

                        // Mapowanie – dostosuj indeksy do swoich danych
                        const teams = rows.map(row => {
                            const cells = row.c;
                            return {
                                class: cells[1]?.v || '',
                                name: cells[2]?.v || '',
                                wins: cells[3]?.v || '0',
                                losses: cells[4]?.v || '0',
                                draws: cells[5]?.v || '0',
                                points: cells[6]?.v || '0',
                                pointsDiff: cells[7]?.v || ''
                            };
                        });

                        console.log('Dane koszykówki:', teams);

                        // Sortowanie: punkty (malejąco), wygrane (malejąco), przegrane (rosnąco)
                        const sortTeams = (a, b) => {
                            // 1. Punkty (malejąco)
                            const ptsA = parseInt(a.points) || 0;
                            const ptsB = parseInt(b.points) || 0;
                            if (ptsA !== ptsB) return ptsB - ptsA;

                            // 2. Bilans punktów (malejąco) – NOWE KRYTERIUM
                            const diffA = parseInt(a.pointsDiff) || 0;
                            const diffB = parseInt(b.pointsDiff) || 0;
                            if (diffA !== diffB) return diffB - diffA;

                            // 3. Wygrane (malejąco)
                            const winsA = parseInt(a.wins) || 0;
                            const winsB = parseInt(b.wins) || 0;
                            if (winsA !== winsB) return winsB - winsA;

                            // 4. Przegrane (rosnąco – mniej przegranych lepsze)
                            const lossesA = parseInt(a.losses) || 0;
                            const lossesB = parseInt(b.losses) || 0;
                            return lossesA - lossesB;
                        };

                        let groupATeams = teams.filter(t => t.group === 'A' || t.group === 'Grupa A');
                        let groupBTeams = teams.filter(t => t.group === 'B' || t.group === 'Grupa B');

                        groupATeams.sort(sortTeams);
                        groupBTeams.sort(sortTeams);

                        if (groupATeams.length === 0 && groupBTeams.length === 0) {
                            const half = Math.ceil(teams.length / 2);
                            let groupATeamsAlt = teams.slice(0, half);
                            let groupBTeamsAlt = teams.slice(half);
                            groupATeamsAlt.sort(sortTeams);
                            groupBTeamsAlt.sort(sortTeams);
                            container.innerHTML = renderGroupTable('Grupa A', groupATeamsAlt) + renderGroupTable('Grupa B', groupBTeamsAlt);
                        } else {
                            container.innerHTML = renderGroupTable('Grupa A', groupATeams) + renderGroupTable('Grupa B', groupBTeams);
                        }
                    })
                    .catch(error => {
                        console.error('Błąd:', error);
                        displayError('tablesContainer', 'Nie udało się załadować danych. Sprawdź połączenie lub skonfiguruj arkusz.');
                    });
            }

            // ================== DRABINKA PUCHAROWA ==================
            function renderBracketMatch(match, title) {
    const hasScore = match.score1 !== '' && match.score2 !== '' && 
                     !isNaN(parseInt(match.score1)) && !isNaN(parseInt(match.score2));
    
    return `
        <div class="bracket-match ${title === 'Finał' ? 'final' : title === 'Mecz o 3. miejsce' ? 'third' : ''}">
            <h4>${title}</h4>
            <table class="match-rows">
                <tr>
                    <td class="team-cell">${match.team1 || '?'}</td>
                    <td class="score-cell">${hasScore ? match.score1 : '<span class="score-empty">?</span>'}</td>
                    <td class="score-sep">:</td>
                    <td class="score-cell">${hasScore ? match.score2 : '<span class="score-empty">?</span>'}</td>
                    <td class="team-cell" style="text-align:right;">${match.team2 || '?'}</td>
                </tr>
            </table>
        </div>
    `;
}
function loadBracket() {
    const container = document.getElementById('bracketContainer');
    container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Ładowanie drabinki...</p></div>';

    fetch(bracketUrl)
        .then(response => {
            if (!response.ok) throw new Error('Błąd sieci');
            return response.text();
        })
        .then(text => {
            const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
            if (!jsonText) throw new Error('Nieprawidłowa odpowiedź');
            const data = JSON.parse(jsonText[1]);
            const rows = data.table.rows;

            if (!rows || rows.length < 4) {
                container.innerHTML = '<div class="empty-state"><i class="far fa-frown"></i><p>Brak danych drabinki</p></div>';
                return;
            }

            // Pobieramy kolejne wiersze
            const sf1 = {
                team1: rows[0].c[0]?.v || '',   // kolumna N
                score1: rows[0].c[1]?.v || '',  // O
                score2: rows[0].c[2]?.v || '',  // P
                team2: rows[0].c[3]?.v || ''    // Q
            };
            const sf2 = {
                team1: rows[1].c[0]?.v || '',
                score1: rows[1].c[1]?.v || '',
                score2: rows[1].c[2]?.v || '',
                team2: rows[1].c[3]?.v || ''
            };
            const third = {
                team1: rows[2].c[0]?.v || '',
                score1: rows[2].c[1]?.v || '',
                score2: rows[2].c[2]?.v || '',
                team2: rows[2].c[3]?.v || ''
            };
            const final = {
                team1: rows[3].c[0]?.v || '',
                score1: rows[3].c[1]?.v || '',
                score2: rows[3].c[2]?.v || '',
                team2: rows[3].c[3]?.v || ''
            };

            const html = `
                <div class="bracket-grid">
                    <div class="sf1">${renderBracketMatch(sf1, 'Półfinał 1')}</div>
                    <div class="sf2">${renderBracketMatch(sf2, 'Półfinał 2')}</div>
                    <div class="final">${renderBracketMatch(final, 'Finał')}</div>
                    <div class="third">${renderBracketMatch(third, 'Mecz o 3. miejsce')}</div>
                </div>
            `;

            container.innerHTML = html;
        })
        .catch(error => {
            console.error('Błąd ładowania drabinki:', error);
            container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Nie udało się załadować drabinki</div>';
        });
}
            // ================== MECZE / TERMINARZ ==================
            function parseDate(dateStr, timeStr) {
                if (!dateStr) return null;
                let datePart = dateStr.trim();
                let timePart = timeStr ? timeStr.trim() : '00:00';
                
                // Obsługa formatu DD.MM.RRRR
                if (datePart.includes('.')) {
                    let parts = datePart.split('.');
                    if (parts.length === 3) {
                        datePart = `${parts[2]}-${parts[1]}-${parts[0]}`;
                    }
                }
                
                // Jeśli jest w formacie RRRR-MM-DD, to zadziała
                return new Date(`${datePart}T${timePart}:00`);
            }

            function renderMatchCard(match) {
                const hasScore = match.score1 !== '' && match.score2 !== '' && !isNaN(parseInt(match.score1)) && !isNaN(parseInt(match.score2));
                const statusClass = hasScore ? 'status-finished' : 'status-upcoming';
                const statusText = hasScore ? 'Rozegrany' : 'Nadchodzący';
                const matchCardClass = hasScore ? 'match-card--finished' : 'match-card--upcoming';

                let winnerClass1 = '';
                let winnerClass2 = '';
                if (hasScore) {
                    const s1 = parseInt(match.score1);
                    const s2 = parseInt(match.score2);
                    if (s1 > s2) {
                        winnerClass1 = 'team-winner';
                    } else if (s2 > s1) {
                        winnerClass2 = 'team-winner';
                    }
                    // remis – obie klasy puste
                }

                return `
                    <div class="match-card ${matchCardClass}">
                        <div class="match-header">
                            <span class="match-date">
                                <i class="far fa-calendar-alt"></i> ${match.date} 
                                <span class="date-time-separator"></span>
                                <i class="far fa-clock"></i> ${match.time}</span>
                        </div>
                        <div class="match-teams">
                            <div class="team team-home ${winnerClass1}">
                                <span class="team-name">${match.team1}</span>
                                ${hasScore ? `<span class="team-score">${match.score1}</span>` : '<span class="team-score team-score-empty">?</span>'}
                            </div>
                            <!-- Separator na desktop (:) -->
                            <div class="match-score-separator desktop-only">
                                <span>:</span>
                            </div>
                            <!-- Separator na mobile (vs) -->
                            <div class="match-score-separator mobile-only">
                                <span>vs</span>
                            </div>
                            <div class="team team-away ${winnerClass2}">
                                <span class="team-name">${match.team2}</span>
                                ${hasScore ? `<span class="team-score">${match.score2}</span>` : '<span class="team-score team-score-empty">?</span>'}
                            </div>
                        </div>
                        <div class="match-footer">
                            <div class="match-status ${statusClass}">${statusText}</div>
                            <div class="match-sport-icon"><i class="fas fa-basketball-ball"></i></div>
                        </div>
                    </div>
                `;
            }

            function loadMatches() {
                const container = document.getElementById('matchesContainer');
                showLoading('matchesContainer');

                fetch(matchesUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Błąd sieci');
                        return response.text();
                    })
                    .then(text => {
                        const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
                        if (!jsonText) throw new Error('Nieprawidłowa odpowiedź z Google Sheets');
                        
                        const data = JSON.parse(jsonText[1]);
                        const rows = data.table.rows;

                        if (!rows || rows.length === 0) {
                            container.innerHTML = '<div class="empty-state"><i class="far fa-frown"></i><p>Brak meczów</p></div>';
                            return;
                        }

                        // Mapowanie wierszy na obiekty meczów
                        const matches = rows.map(row => {
                            const cells = row.c;
                            return {
                                date: cells[0]?.v || '',
                                time: cells[1]?.v || '',
                                team1: cells[2]?.v || '',
                                score1: cells[3]?.v || '',
                                score2: cells[4]?.v || '',
                                team2: cells[5]?.v || '',
                                header: cells[6]?.v || ''
                            };
                        }).filter(m => m.team1 && m.team2); // Tylko mecze z obiema drużynami

                        if (matches.length === 0) {
                            container.innerHTML = '<div class="empty-state"><i class="far fa-frown"></i><p>Brak meczów</p></div>';
                            return;
                        }

                        // Sortowanie według daty (rosnąco)
                        matches.sort((a, b) => {
                            const dateA = parseDate(a.date, a.time);
                            const dateB = parseDate(b.date, b.time);
                            if (!dateA && !dateB) return 0;
                            if (!dateA) return 1;
                            if (!dateB) return -1;
                            return dateA - dateB;
                        });

                        // Renderowanie z nagłówkami
                        let lastHeader = '';
                        let html = '';
                        
                        matches.forEach(match => {
                            if (match.header && match.header !== lastHeader) {
                                html += `<h3 class="matches-group-header">${match.header}</h3>`;
                                lastHeader = match.header;
                            }
                            html += renderMatchCard(match);
                        });

                        container.innerHTML = html;
                    })
                    .catch(error => {
                        console.error('Błąd ładowania meczów:', error);
                        displayError('matchesContainer', 'Nie udało się załadować meczów. Sprawdź połączenie lub skonfiguruj arkusz.');
                    });
            }

            // ================== INICJALIZACJA ==================
            document.addEventListener('DOMContentLoaded', function() {
                // Ładujemy tabele grupowe
                loadBasketballData();
                // Ładujemy mecze
                loadMatches();
                loadBracket();
                // Odświeżanie co 20 minut (1200000 ms)
                setInterval(() => {
                    loadBasketballData();
                    loadMatches();
                    loadBracket();

                }, 1200000);
            });

            // Przycisk odświeżania meczów
            document.getElementById('refreshMatchesBtn').addEventListener('click', function(e) {
                e.preventDefault();
                loadMatches();
            });

            // Eksport funkcji do globalnego zasięgu (opcjonalnie)
            window.loadBasketballData = loadBasketballData;
            window.loadMatches = loadMatches;
        })();
    </script>
</body>
</html>
